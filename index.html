<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FlashCode v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        #resizer { width: 6px; cursor: col-resize; background: #27272a; transition: background 0.2s; }
        #resizer:hover { background: #6366f1; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="h-screen flex flex-col bg-zinc-950 text-white overflow-hidden">
    <!-- Header -->
    <header class="h-14 border-b border-zinc-800 flex items-center justify-between px-4">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-1 rounded"><i data-lucide="zap" class="w-5 h-5 text-white"></i></div>
            <span class="font-bold">FlashCode</span>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleSettings()" class="text-zinc-400 hover:text-white"><i data-lucide="settings" class="w-5 h-5"></i></button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Editor -->
        <div id="left-panel" class="flex-1 flex flex-col min-w-[200px]">
            <div class="h-10 bg-zinc-900 border-b border-zinc-800 flex items-center px-4 justify-between">
                <input id="filename-input" type="text" value="index.js" class="bg-transparent text-xs outline-none border-b border-zinc-700 text-zinc-300 w-32 focus:border-indigo-500">
                <button onclick="runCode()" class="bg-green-600 hover:bg-green-500 px-3 py-1 rounded text-xs font-bold">Run</button>
            </div>
            <textarea id="code-editor" class="flex-1 bg-zinc-950 p-4 font-mono text-sm outline-none resize-none">console.log("Console is now active!");</textarea>
        </div>

        <!-- Resizer -->
        <div id="resizer"></div>

        <!-- Preview/Console -->
        <div id="right-panel" class="w-[400px] flex flex-col bg-zinc-900 min-w-[200px]">
            <div class="flex bg-zinc-950 border-b border-zinc-800">
                <button onclick="switchTab('preview')" class="px-4 py-2 text-xs">PREVIEW</button>
                <button onclick="switchTab('console')" class="px-4 py-2 text-xs border-b-2 border-indigo-500">CONSOLE</button>
            </div>
            <div class="flex-1 relative">
                <iframe id="output-iframe" class="absolute inset-0 w-full h-full bg-white hidden"></iframe>
                <div id="console-output" class="absolute inset-0 p-4 font-mono text-xs text-zinc-300 overflow-y-auto bg-black">
                    <div class="text-zinc-500">// Logs will appear here...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center hidden">
        <div class="bg-zinc-900 p-6 rounded-lg border border-zinc-800 w-80">
            <h3 class="font-bold mb-4">Settings</h3>
            <label class="text-xs text-zinc-500">API KEY</label>
            <input type="password" id="api-key" class="w-full bg-black border border-zinc-800 p-2 rounded mb-4 text-xs" placeholder="Paste key here">
            <button onclick="toggleSettings()" class="w-full bg-indigo-600 py-2 rounded text-sm font-bold">Save</button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Resizing Logic
        const leftPanel = document.getElementById('left-panel');
        const rightPanel = document.getElementById('right-panel');
        const resizer = document.getElementById('resizer');

        resizer.addEventListener('mousedown', (e) => {
            document.addEventListener('mousemove', resize);
            document.addEventListener('mouseup', () => document.removeEventListener('mousemove', resize));
        });

        function resize(e) {
            const newWidth = window.innerWidth - e.clientX;
            if (newWidth > 150 && newWidth < (window.innerWidth - 150)) {
                rightPanel.style.width = newWidth + 'px';
            }
        }

        // Console & Execution Logic
        function runCode() {
            const code = document.getElementById('code-editor').value;
            const iframe = document.getElementById('output-iframe');
            const patch = `
                <script>
                    const originalLog = console.log;
                    console.log = (...args) => {
                        window.parent.postMessage({ type: 'log', data: args.join(' ') }, '*');
                        originalLog(...args);
                    };
                <\/script>`;
            iframe.srcdoc = `<html><body>${patch}<script>${code}<\/script></body></html>`;
        }

        window.addEventListener('message', (e) => {
            if (e.data.type === 'log') {
                const entry = document.createElement('div');
                entry.className = 'border-b border-zinc-800 py-1';
                entry.textContent = `> ${e.data.data}`;
                document.getElementById('console-output').appendChild(entry);
            }
        });

        function switchTab(tab) {
            document.getElementById('output-iframe').classList.toggle('hidden', tab === 'console');
            document.getElementById('console-output').classList.toggle('hidden', tab === 'preview');
        }

        function toggleSettings() {
            document.getElementById('settings-modal').classList.toggle('hidden');
        }
    </script>
</body>
</html>
