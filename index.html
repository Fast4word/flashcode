<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashCode | AI-Native IDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        @import url('https://fonts.googleapis.com');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #fafafa; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .hidden { display: none; }
        .tab-active { border-bottom: 2px solid #6366f1; color: #fff; background: #18181b; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="h-14 border-b border-zinc-800 flex items-center justify-between px-4 bg-zinc-950 z-50">
        <div class="flex items-center gap-3 cursor-pointer" onclick="switchView('dashboard')">
            <div class="p-1.5 bg-indigo-600 rounded-lg"><i data-lucide="zap" class="w-5 h-5 text-white fill-current"></i></div>
            <h1 class="text-lg font-bold tracking-tight">FlashCode</h1>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="shareProject()" class="text-xs text-zinc-400 hover:text-white flex items-center gap-1">
                <i data-lucide="share-2" class="w-3 h-3"></i> Share
            </button>
            <div id="auth-section">
                <button onclick="toggleAuthModal()" class="px-4 py-1.5 bg-zinc-800 rounded-md text-sm border border-zinc-700">Login</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar -->
        <nav class="w-12 border-r border-zinc-800 flex flex-col items-center py-4 gap-6 bg-zinc-950">
            <i data-lucide="layout-dashboard" onclick="switchView('dashboard')" class="w-5 h-5 text-zinc-400 cursor-pointer hover:text-white"></i>
            <i data-lucide="code" onclick="switchView('editor')" class="w-5 h-5 text-indigo-400 cursor-pointer"></i>
            <i data-lucide="sparkles" onclick="toggleVibeMode()" class="w-5 h-5 text-yellow-500 cursor-pointer animate-pulse"></i>
        </nav>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="flex-1 overflow-y-auto p-8 bg-zinc-950">
            <h2 class="text-2xl font-bold mb-6">Recent Projects</h2>
            <div id="project-grid" class="grid grid-cols-3 gap-4">
                <!-- Cards injected here -->
            </div>
        </div>

        <!-- Editor View -->
        <div id="editor-view" class="flex-1 flex hidden">
            <!-- Code Area -->
            <div class="flex-1 flex flex-col border-r border-zinc-800">
                <div class="h-10 bg-zinc-900 border-b border-zinc-800 flex items-center px-4 justify-between">
                    <span class="text-xs mono text-zinc-500">main.js</span>
                    <button onclick="runCode()" class="bg-green-600 hover:bg-green-500 text-white text-xs px-3 py-1 rounded flex items-center gap-1">
                        <i data-lucide="play" class="w-3 h-3 fill-current"></i> Run
                    </button>
                </div>
                <textarea id="code-editor" class="flex-1 bg-zinc-950 p-4 mono text-sm outline-none text-zinc-300 resize-none">function hello() {
  console.log("FlashCode is Live!");
}</textarea>
            </div>

            <!-- Right Window (JDoodle Style) -->
            <div class="w-[500px] flex flex-col bg-zinc-900">
                <!-- Tabs -->
                <div class="flex bg-zinc-950 border-b border-zinc-800">
                    <button onclick="switchTab('preview')" id="tab-preview" class="px-4 py-2 text-xs font-bold text-zinc-500 tab-active">PREVIEW</button>
                    <button onclick="switchTab('console')" id="tab-console" class="px-4 py-2 text-xs font-bold text-zinc-500">CONSOLE</button>
                    <button onclick="switchTab('ai')" id="tab-ai" class="px-4 py-2 text-xs font-bold text-zinc-500">AI ASSISTANT</button>
                </div>

                <!-- Tab Content -->
                <div class="flex-1 relative overflow-hidden">
                    <div id="content-preview" class="absolute inset-0 bg-white">
                        <iframe id="output-iframe" class="w-full h-full border-none"></iframe>
                    </div>
                    <div id="content-console" class="absolute inset-0 bg-black p-4 hidden mono text-xs text-green-400 overflow-y-auto">
                        <div>> System Ready...</div>
                    </div>
                    <div id="content-ai" class="absolute inset-0 bg-zinc-900 flex flex-col hidden">
                        <div id="chat-history" class="flex-1 p-4 overflow-y-auto text-sm space-y-4">
                            <div class="bg-zinc-800 p-3 rounded-lg text-zinc-300">How can I help you build today?</div>
                        </div>
                        <div class="p-4 border-t border-zinc-800">
                            <input type="text" id="ai-input" placeholder="Ask about your code..." class="w-full bg-zinc-950 border border-zinc-700 rounded p-2 text-xs outline-none focus:border-indigo-500">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Vibe Mode Overlay -->
    <div id="vibe-overlay" class="fixed inset-0 bg-indigo-900/20 backdrop-blur-xl z-[100] flex items-center justify-center hidden">
        <div class="w-full max-w-2xl p-8 bg-zinc-900 border border-indigo-500/50 rounded-2xl shadow-2xl">
            <div class="flex items-center gap-3 mb-6">
                <i data-lucide="sparkles" class="w-8 h-8 text-yellow-400"></i>
                <h2 class="text-3xl font-black italic tracking-tighter">VIBE CODER</h2>
            </div>
            <textarea id="vibe-prompt" placeholder="Describe the vibe... e.g. 'A 3D space shooter with synthwave colors'" class="w-full h-40 bg-black border border-zinc-700 rounded-xl p-4 text-lg outline-none focus:border-yellow-400 transition-all"></textarea>
            <div class="mt-6 flex justify-between items-center">
                <p class="text-xs text-zinc-500 italic">AI will access your context automatically</p>
                <button onclick="generateVibe()" class="px-8 py-3 bg-yellow-400 text-black font-black rounded-full hover:scale-105 transition-transform">GENERATE FLASH</button>
            </div>
        </div>
    </div>

    <script>
        // Initialize Icons
        function refreshIcons() { lucide.createIcons(); }
        refreshIcons();

        // View Switching
        function switchView(view) {
            document.getElementById('dashboard-view').classList.toggle('hidden', view !== 'dashboard');
            document.getElementById('editor-view').classList.toggle('hidden', view !== 'editor');
            refreshIcons();
        }

        // Tab Logic
        function switchTab(tab) {
            ['preview', 'console', 'ai'].forEach(t => {
                document.getElementById(`content-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        }

        // Run Code into Preview
        function runCode() {
            const code = document.getElementById('code-editor').value;
            const iframe = document.getElementById('output-iframe');
            const consoleDiv = document.getElementById('content-console');
            
            iframe.srcdoc = `<html><body><script>${code}<\/script></body></html>`;
            consoleDiv.innerHTML += `<div>> Executed main.js at ${new Date().toLocaleTimeString()}</div>`;
            switchTab('preview');
        }

        // Vibe Mode Toggle
        function toggleVibeMode() {
            document.getElementById('vibe-overlay').classList.toggle('hidden');
        }

        async function generateVibe() {
            const prompt = document.getElementById('vibe-prompt').value;
            const currentCode = document.getElementById('code-editor').value;
            
            // Logic: Here you would call your AI endpoint (OpenAI/Anthropic)
            // passing the prompt AND the currentCode for context.
            
            toggleVibeMode();
            switchTab('ai');
            document.getElementById('chat-history').innerHTML += `<div class="bg-indigo-600/20 p-3 rounded-lg border border-indigo-500/30">Vibe: ${prompt}</div>`;
        }

        async function shareProject() {
            // Logic to set is_public = true in Supabase and copy link
            const shareUrl = `${window.location.origin}?share=123`; 
            navigator.clipboard.writeText(shareUrl);
            alert("Shareable link copied to clipboard!");
        }
    </script>
</body>
</html>
