<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashCode | AI-Native IDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        @import url('https://fonts.googleapis.com');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #fafafa; margin: 0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .hidden { display: none !important; }
        .tab-active { border-bottom: 2px solid #6366f1; color: #fff; background: #18181b; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <script>
        // INSERT YOUR KEYS HERE
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    </script>

    <!-- Header -->
    <header class="h-14 border-b border-zinc-800 flex items-center justify-between px-4 bg-zinc-950 z-50">
        <div class="flex items-center gap-3 cursor-pointer" onclick="switchView('dashboard')">
            <div class="p-1.5 bg-indigo-600 rounded-lg"><i data-lucide="zap" class="w-5 h-5 text-white fill-current"></i></div>
            <h1 class="text-lg font-bold tracking-tight">FlashCode</h1>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="shareProject()" class="text-xs text-zinc-400 hover:text-white flex items-center gap-1">
                <i data-lucide="share-2" class="w-3 h-3"></i> Share
            </button>
            <div id="auth-section">
                <button onclick="toggleAuthModal()" class="px-4 py-1.5 bg-zinc-800 rounded-md text-sm border border-zinc-700">Login</button>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Sidebar -->
        <nav class="w-12 border-r border-zinc-800 flex flex-col items-center py-4 gap-6 bg-zinc-950">
            <i data-lucide="layout-dashboard" onclick="switchView('dashboard')" class="w-5 h-5 text-zinc-400 cursor-pointer hover:text-white"></i>
            <i data-lucide="code" onclick="switchView('editor')" class="w-5 h-5 text-zinc-400 cursor-pointer hover:text-white"></i>
            <i data-lucide="sparkles" onclick="toggleVibeMode()" class="w-5 h-5 text-yellow-500 cursor-pointer animate-pulse"></i>
        </nav>

        <!-- DASHBOARD (Empty State Fix) -->
        <div id="dashboard-view" class="flex-1 overflow-y-auto p-8 bg-zinc-950">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold">Recent Projects</h2>
                <button onclick="switchView('editor')" class="bg-indigo-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-indigo-500 transition-all">New Project</button>
            </div>
            <div id="project-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- If no projects, show this -->
                <div class="col-span-full border-2 border-dashed border-zinc-800 rounded-2xl h-64 flex flex-col items-center justify-center text-zinc-600">
                    <i data-lucide="folder-plus" class="w-12 h-12 mb-4 opacity-20"></i>
                    <p>No projects found. Create your first Flash!</p>
                </div>
            </div>
        </div>

        <!-- EDITOR (JDoodle Style) -->
        <div id="editor-view" class="flex-1 flex hidden">
            <div class="flex-1 flex flex-col border-r border-zinc-800">
                <div class="h-10 bg-zinc-900 border-b border-zinc-800 flex items-center px-4 justify-between">
                    <span class="text-xs mono text-zinc-500">main.js</span>
                    <button onclick="runCode()" class="bg-green-600 hover:bg-green-500 text-white text-xs px-3 py-1 rounded flex items-center gap-1">
                        <i data-lucide="play" class="w-3 h-3 fill-current"></i> Run
                    </button>
                </div>
                <textarea id="code-editor" class="flex-1 bg-zinc-950 p-4 mono text-sm outline-none text-zinc-300 resize-none">console.log("Welcome to FlashCode!");</textarea>
            </div>

            <!-- Tabbed Window -->
            <div class="w-[500px] flex flex-col bg-zinc-900">
                <div class="flex bg-zinc-950 border-b border-zinc-800">
                    <button onclick="switchTab('preview')" id="tab-preview" class="px-4 py-2 text-[10px] font-bold tracking-widest text-zinc-500 tab-active">PREVIEW</button>
                    <button onclick="switchTab('console')" id="tab-console" class="px-4 py-2 text-[10px] font-bold tracking-widest text-zinc-500">CONSOLE</button>
                    <button onclick="switchTab('ai')" id="tab-ai" class="px-4 py-2 text-[10px] font-bold tracking-widest text-zinc-500">AI ASSISTANT</button>
                </div>
                <div class="flex-1 relative">
                    <div id="content-preview" class="absolute inset-0 bg-white">
                        <iframe id="output-iframe" class="w-full h-full border-none"></iframe>
                    </div>
                    <div id="content-console" class="absolute inset-0 bg-black p-4 hidden mono text-[11px] text-green-400 overflow-y-auto">
                        <div>> FlashCode Kernel 1.0... Ready.</div>
                    </div>
                    <div id="content-ai" class="absolute inset-0 bg-zinc-900 flex flex-col hidden">
                        <div id="chat-history" class="flex-1 p-4 overflow-y-auto text-sm space-y-4">
                            <div class="bg-zinc-800 p-3 rounded-lg text-zinc-300">AI Assistant ready. How can I help you build today?</div>
                        </div>
                        <div class="p-4 border-t border-zinc-800">
                            <input type="text" placeholder="Ask AI..." class="w-full bg-zinc-950 border border-zinc-700 rounded-lg p-2 text-xs outline-none focus:border-indigo-500">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- VIBE MODE MODAL -->
    <div id="vibe-overlay" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex items-center justify-center hidden">
        <div class="w-full max-w-xl p-8 bg-zinc-900 border border-indigo-500/50 rounded-3xl shadow-2xl">
            <div class="flex items-center gap-3 mb-6">
                <i data-lucide="sparkles" class="w-8 h-8 text-yellow-400"></i>
                <h2 class="text-2xl font-black tracking-tight uppercase italic">Vibe Coder</h2>
            </div>
            <textarea id="vibe-prompt" placeholder="E.g. 'A neon-themed synthwave racing game with basic physics'..." class="w-full h-40 bg-black border border-zinc-800 rounded-xl p-4 text-lg outline-none focus:border-indigo-500 transition-all"></textarea>
            <button onclick="generateVibe()" class="w-full mt-6 py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl text-lg uppercase tracking-widest shadow-lg shadow-indigo-500/20 transition-all">Generate Flash</button>
            <button onclick="toggleVibeMode()" class="w-full mt-2 text-zinc-600 text-xs hover:text-white uppercase tracking-widest">Cancel</button>
        </div>
    </div>

    <script>
        // INITIALIZE ICONS - CRITICAL FIX
        window.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); });

        function refreshIcons() { setTimeout(() => lucide.createIcons(), 10); }

        function switchView(view) {
            document.getElementById('dashboard-view').classList.toggle('hidden', view !== 'dashboard');
            document.getElementById('editor-view').classList.toggle('hidden', view !== 'editor');
            refreshIcons();
        }

        function switchTab(tab) {
            ['preview', 'console', 'ai'].forEach(t => {
                document.getElementById(`content-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            refreshIcons();
        }

        function toggleVibeMode() {
            document.getElementById('vibe-overlay').classList.toggle('hidden');
            refreshIcons();
        }

        function runCode() {
            const code = document.getElementById('code-editor').value;
            const iframe = document.getElementById('output-iframe');
            iframe.srcdoc = `<html><body style="margin:0; background:white;"><script>${code}<\/script></body></html>`;
            switchTab('preview');
        }

        async function generateVibe() {
            toggleVibeMode();
            switchView('editor');
            switchTab('ai');
            // Logic for AI call goes here
        }

        function toggleAuthModal() { alert("Supabase Auth modal would open here."); }
    </script>
</body>
</html>
