<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashCode - AI-Native Web IDE (Invite Only)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; overflow: hidden; background-color: #111827; color: white; }
    
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #1f2937; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

    .resizer { width: 4px; cursor: col-resize; background: #374151; transition: background 0.2s; z-index: 10; }
    .resizer:hover, .resizer.active { background: #3b82f6; }

    .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; background-color: rgba(59, 130, 246, 0.1); }
    .project-card { transition: all 0.3s; border: 1px solid #374151; }
    .project-card:hover { transform: translateY(-4px); box-shadow: 0 8px 16px rgba(0,0,0,0.4); border-color: #60a5fa; }
    
    .console-msg { font-family: 'Fira Code', monospace; font-size: 13px; padding: 2px 0; border-bottom: 1px solid #374151; }
    .console-log { color: #10b981; }
    .console-error { color: #ef4444; }
    .console-warn { color: #f59e0b; }
    .console-info { color: #3b82f6; }

    /* Chat Markdown Styling */
    .chat-content pre { background: #1f2937; padding: 10px; border-radius: 6px; overflow-x: auto; margin: 8px 0; border: 1px solid #374151; }
    .chat-content code { font-family: 'Fira Code', monospace; font-size: 12px; color: #e5e7eb; }
    .chat-content p { margin-bottom: 6px; }
    .code-header { font-size: 10px; color: #9ca3af; text-transform: uppercase; margin-bottom: 4px; display: block; font-weight: bold; }
  </style>
</head>
<body class="bg-gray-900 text-white">

  <div id="app" class="h-screen flex flex-col">
    <!-- NOTIFICATIONS -->
    <div id="notification" class="hidden fixed top-4 right-4 bg-blue-600 text-white px-6 py-3 rounded-lg shadow-lg z-[100] flex items-center gap-2 transform transition-all duration-300">
      <i id="notifIcon" data-lucide="info" class="w-5 h-5"></i>
      <span id="notifMessage">Message</span>
    </div>

    <!-- TOP BAR -->
    <div class="bg-gray-800 border-b border-gray-700 px-4 py-2 flex items-center justify-between h-14">
      <div class="flex items-center gap-2">
        <div class="bg-purple-600 p-1.5 rounded-lg">
          <i data-lucide="zap" class="w-5 h-5 text-white"></i>
        </div>
        <div class="flex flex-col">
          <span class="font-bold text-xl leading-none">FlashCode</span>
          <span id="storageBadge" class="text-[10px] text-yellow-500 font-bold uppercase tracking-widest">Local Mode</span>
        </div>
      </div>
      <div id="authButtons" class="flex items-center gap-3">
        <button id="settingsBtn" class="p-2 text-gray-400 hover:text-white hover:bg-gray-700 rounded-full transition-colors" title="AI Settings">
          <i data-lucide="settings" class="w-5 h-5"></i>
        </button>
        <button id="loginBtn" class="px-4 py-1.5 bg-blue-600 hover:bg-blue-700 rounded-md font-medium text-sm transition-colors">Sign In / Invite</button>
        <div id="userInfo" class="hidden flex items-center gap-3">
          <span id="userEmail" class="text-xs text-gray-400"></span>
          <button id="logoutBtn" class="p-2 text-gray-400 hover:text-red-400 hover:bg-gray-700 rounded-full transition-colors">
            <i data-lucide="log-out" class="w-4 h-4"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="flex-1 flex overflow-hidden">
      <!-- SIDEBAR -->
      <div class="w-16 bg-gray-800 border-r border-gray-700 flex flex-col items-center py-4 gap-4 z-20">
        <button class="activity-btn w-10 h-10 flex items-center justify-center rounded-lg hover:bg-gray-700 transition-colors text-gray-400" data-view="dashboard" title="Dashboard">
          <i data-lucide="layout-grid" class="w-5 h-5"></i>
        </button>
        <button class="activity-btn w-10 h-10 flex items-center justify-center rounded-lg bg-gray-700 text-blue-400" data-view="editor" title="Editor">
          <i data-lucide="code-2" class="w-5 h-5"></i>
        </button>
        <button class="activity-btn w-10 h-10 flex items-center justify-center rounded-lg hover:bg-gray-700 transition-colors text-purple-400" data-view="vibe" title="Vibe AI">
          <i data-lucide="sparkles" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- DASHBOARD -->
      <div id="dashboardView" class="flex-1 p-8 overflow-auto hidden bg-gray-900">
        <div class="max-w-6xl mx-auto">
          <div class="flex items-center justify-between mb-8">
            <div>
              <h1 class="text-3xl font-bold mb-2">My Projects</h1>
              <p id="dashboardSubtext" class="text-gray-400">Stored locally in your browser.</p>
            </div>
            <button id="newProjectBtn" class="px-5 py-2.5 bg-purple-600 hover:bg-purple-700 rounded-lg flex items-center gap-2 font-medium">
              <i data-lucide="plus" class="w-5 h-5"></i> New Project
            </button>
          </div>
          <div id="projectsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
      </div>

      <!-- EDITOR -->
      <div id="editorView" class="flex-1 flex min-w-0">
        <div class="flex-1 flex flex-col bg-gray-900 min-w-0">
          <div class="bg-gray-800 border-b border-gray-700 px-4 py-2 flex items-center gap-3 h-12">
            <!-- File Controls -->
            <div class="flex items-center bg-gray-900 rounded border border-gray-700">
              <select id="fileSelector" class="bg-transparent border-none px-2 py-1 rounded text-sm outline-none text-gray-300 w-32 cursor-pointer"></select>
            </div>
            
            <button id="addFileBtn" class="p-1.5 hover:bg-gray-700 rounded text-gray-400 hover:text-white" title="Add File">
              <i data-lucide="file-plus" class="w-4 h-4"></i>
            </button>
            <button id="deleteFileBtn" class="p-1.5 hover:bg-gray-700 rounded text-gray-400 hover:text-red-400" title="Delete File">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>

            <div class="h-4 w-[1px] bg-gray-700 mx-2"></div>

            <input id="filename" type="text" class="bg-transparent border-b border-transparent focus:border-blue-500 px-1 py-0.5 text-sm outline-none text-gray-300 w-40" placeholder="filename.ext" />
            
            <div class="flex-1"></div>
            
            <button id="saveBtn" class="px-3 py-1.5 bg-green-600 hover:bg-green-700 rounded text-white text-xs font-medium flex items-center gap-1">
              <i data-lucide="save" class="w-3 h-3"></i> Save
            </button>
            <button id="runBtn" class="px-4 py-1.5 bg-blue-600 hover:bg-blue-700 rounded text-white text-xs font-medium flex items-center gap-1 shadow-lg shadow-blue-900/30">
              <i data-lucide="play" class="w-3 h-3"></i> Run
            </button>
          </div>
          <div id="monacoEditor" class="flex-1 w-full"></div>
        </div>
        
        <div id="resizer" class="resizer flex items-center justify-center">
            <div class="w-0.5 h-8 bg-gray-600 rounded"></div>
        </div>

        <!-- RIGHT PANEL -->
        <div id="rightPanel" class="w-[450px] flex flex-col bg-gray-800 border-l border-gray-700" style="min-width: 300px; max-width: 800px;">
            <div class="flex border-b border-gray-700 bg-gray-800">
                <button class="tab-btn flex-1 px-4 py-3 text-xs font-medium hover:bg-gray-700 text-gray-400 transition-colors tab-active" data-tab="preview">PREVIEW</button>
                <button class="tab-btn flex-1 px-4 py-3 text-xs font-medium hover:bg-gray-700 text-gray-400 transition-colors" data-tab="console">CONSOLE</button>
                <button class="tab-btn flex-1 px-4 py-3 text-xs font-medium hover:bg-gray-700 text-gray-400 transition-colors" data-tab="chat">AI CHAT</button>
            </div>

            <div class="flex-1 relative bg-gray-900 overflow-hidden">
                <!-- Preview -->
                <div id="previewTab" class="absolute inset-0 bg-white">
                  <iframe id="previewFrame" class="w-full h-full border-0"></iframe>
                </div>
                <!-- Console -->
                <div id="consoleTab" class="absolute inset-0 bg-gray-900 p-4 overflow-auto hidden">
                    <div id="consoleOutput" class="flex flex-col gap-1"></div>
                </div>
                <!-- Chat -->
                <div id="chatTab" class="absolute inset-0 bg-gray-900 flex flex-col hidden">
                    <div id="chatMessages" class="flex-1 overflow-auto p-4 space-y-4">
                        <div class="text-center text-gray-500 text-sm mt-4">
                            <p>I can see your code! Ask me to fix errors or explain it.</p>
                        </div>
                    </div>
                    <div class="p-3 bg-gray-800 border-t border-gray-700">
                        <div class="flex gap-2">
                            <input id="chatInput" type="text" placeholder="Ask a question..." class="flex-1 bg-gray-900 border border-gray-600 text-sm rounded-lg px-3 py-2 outline-none focus:border-blue-500 text-white placeholder-gray-500">
                            <button id="sendChatBtn" class="p-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-white transition-colors">
                                <i data-lucide="send" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODALS -->

  <!-- Auth Modal -->
  <div id="loginModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-[200]">
    <div class="bg-gray-800 rounded-xl border border-gray-700 p-8 max-w-sm w-full mx-4 shadow-2xl">
      <div id="loginView">
        <h2 class="text-2xl font-bold mb-6 text-center">Sign In</h2>
        <div class="space-y-4">
          <input id="loginEmail" type="email" placeholder="Email" class="w-full bg-gray-900 border border-gray-700 px-4 py-2.5 rounded-lg outline-none" />
          <input id="loginPassword" type="password" placeholder="Password" class="w-full bg-gray-900 border border-gray-700 px-4 py-2.5 rounded-lg outline-none" />
          <button id="signInBtn" class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold">Login</button>
          <p class="text-center text-xs text-gray-500">Need an account? <button id="toInviteBtn" class="text-blue-400 hover:underline">Use Invite Code</button></p>
          <button id="closeLoginBtn" class="w-full py-2 text-sm text-gray-400 hover:text-white">Cancel</button>
        </div>
      </div>
      <div id="inviteView" class="hidden">
        <h2 class="text-2xl font-bold mb-6 text-center">Join via Invite</h2>
        <div class="space-y-4">
          <input id="inviteCode" type="text" placeholder="FLASH-2026-WELCOME" class="w-full bg-gray-900 border border-gray-700 px-4 py-2.5 rounded-lg text-center font-mono placeholder-gray-600" />
          <input id="regEmail" type="email" placeholder="Email" class="w-full bg-gray-900 border border-gray-700 px-4 py-2.5 rounded-lg" />
          <input id="regPassword" type="password" placeholder="Password" class="w-full bg-gray-900 border border-gray-700 px-4 py-2.5 rounded-lg" />
          <button id="useInviteBtn" class="w-full py-2.5 bg-purple-600 hover:bg-purple-700 rounded-lg font-semibold">Create Account</button>
          <button id="backToLoginBtn" class="w-full py-2 text-sm text-gray-400 hover:text-white">Back</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-[200]">
    <div class="bg-gray-800 rounded-xl border border-gray-700 p-6 max-w-md w-full mx-4 shadow-2xl">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold">AI Settings</h2>
        <button id="closeSettingsBtn" class="text-gray-400 hover:text-white">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Provider</label>
          <select id="aiProvider" class="w-full bg-gray-900 border border-gray-700 text-white px-3 py-2 rounded-lg outline-none">
            <option value="openrouter_free">OpenRouter (Free Mode)</option>
            <option value="wiki">Local Knowledge + Wiki</option>
            <option value="gemini">Google (Gemini + Search)</option>
            <option value="openai">OpenAI (GPT-4)</option>
            <option value="anthropic">Anthropic (Claude)</option>
          </select>
        </div>
        
        <!-- Standard API Key Field -->
        <div id="apiKeyField" class="hidden">
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">API Key</label>
          <input id="apiKey" type="password" placeholder="sk-..." class="w-full bg-gray-900 border border-gray-700 text-white px-3 py-2 rounded-lg outline-none" />
          <p class="text-xs text-gray-500 mt-1">Keys are stored locally in your browser only.</p>
        </div>

        <button id="saveSettingsBtn" class="w-full py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium text-sm mt-2">Save Settings</button>
      </div>
    </div>
  </div>

  <!-- Vibe Overlay -->
  <div id="vibeOverlay" class="hidden fixed inset-0 vibe-overlay flex items-center justify-center z-[150]">
    <div class="bg-gray-900/90 rounded-xl p-8 max-w-2xl w-full mx-4 neon-border backdrop-blur-xl shadow-2xl">
      <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-3">
          <div class="bg-purple-900/50 p-2 rounded-lg">
            <i data-lucide="sparkles" class="w-6 h-6 text-purple-400"></i>
          </div>
          <div>
            <h2 class="text-2xl font-bold text-white">Vibe Coding</h2>
            <p class="text-purple-300 text-sm">Describe it, and AI builds it.</p>
          </div>
        </div>
        <button id="closeVibeBtn" class="text-gray-400 hover:text-white transition-colors">
          <i data-lucide="x" class="w-6 h-6"></i>
        </button>
      </div>
      <textarea id="vibePrompt" class="w-full h-32 bg-gray-800 text-white p-4 rounded-lg outline-none border border-gray-700 focus:border-purple-500 focus:ring-1 focus:ring-purple-500 mb-6 transition-all placeholder-gray-500" placeholder="Example: Create a python script that calculates fibonacci numbers..."></textarea>
      <button id="generateVibeBtn" class="w-full py-3.5 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 rounded-lg font-bold text-white shadow-lg shadow-purple-900/40 flex items-center justify-center gap-2 transition-all transform hover:scale-[1.02]">
        <i data-lucide="wand-2" class="w-5 h-5"></i> Generate Magic
      </button>
    </div>
  </div>

  <script>
    // --- OPENROUTER KEY ---
    const OPENROUTER_API_KEY = "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"; 
    // ----------------------------------------------
    
    // SYSTEM PROMPT FOR SHORT RESPONSES
    const SYSTEM_PROMPT = "You are an expert coding assistant. Provide concise, direct answers. You have access to the user's current code context. Use Markdown code blocks for code snippets. Avoid verbose explanations.";

    let supabaseClient;
    let editor;
    let currentUser = null;
    let currentProjectId = null;
    let currentFileId = 'main';
    let fileModels = {}; 
    let projectFiles = {
      'main': { name: 'index.html', content: '<h1>Hello World</h1>', language: 'html' }
    };
    
    // Chat History for Multi-turn conversation
    let chatHistory = [];

    const showNotif = (msg, type = 'info') => {
      const el = document.getElementById('notification');
      document.getElementById('notifMessage').textContent = msg;
      el.classList.remove('hidden', 'bg-blue-600', 'bg-red-600', 'bg-green-600');
      el.classList.add(type === 'error' ? 'bg-red-600' : type === 'success' ? 'bg-green-600' : 'bg-blue-600');
      setTimeout(() => el.classList.add('hidden'), 3000);
    };

    async function initApp() {
        const SB_URL = 'https://cxhhcmupzlskffdeamtm.supabase.co';
        const SB_KEY = 'sb_publishable_BymRGYxch7g8iJs81NDS5w_TfAQ-Plf';
        
        if (window.supabase) {
            supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);
            supabaseClient.auth.onAuthStateChange((event, session) => {
                currentUser = session?.user || null;
                updateAuthUI();
                refreshDashboard();
            });
        }
        
        initMonaco();
        initResizer();
        loadSettings();
        lucide.createIcons();
        window.addEventListener('resize', () => { if (editor) editor.layout(); });
    }

    function updateAuthUI() {
        const badge = document.getElementById('storageBadge');
        if (currentUser) {
            document.getElementById('loginBtn').classList.add('hidden');
            document.getElementById('userInfo').classList.remove('hidden');
            document.getElementById('userEmail').textContent = currentUser.email;
            badge.textContent = "Cloud Active";
            badge.className = "text-[10px] text-green-400 font-bold uppercase tracking-widest";
        } else {
            document.getElementById('loginBtn').classList.remove('hidden');
            document.getElementById('userInfo').classList.add('hidden');
            badge.textContent = "Local Mode";
            badge.className = "text-[10px] text-yellow-500 font-bold uppercase tracking-widest";
        }
    }

    function initMonaco() {
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], () => {
            editor = monaco.editor.create(document.getElementById('monacoEditor'), {
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                fontSize: 14,
                padding: { top: 10 }
            });
            updateFileSelector();
            switchFile('main');
        });
    }

    function updateFileSelector() {
        const sel = document.getElementById('fileSelector');
        sel.innerHTML = '';
        Object.entries(projectFiles).forEach(([id, f]) => {
            const opt = document.createElement('option');
            opt.value = id;
            opt.textContent = f.name;
            sel.appendChild(opt);
        });
        sel.value = currentFileId;
    }

    function switchFile(id) {
        if (!editor) return;
        if (projectFiles[currentFileId]) {
            projectFiles[currentFileId].content = editor.getValue();
        }
        currentFileId = id;
        const file = projectFiles[id];
        let model = fileModels[id];
        if (!model || model.isDisposed()) {
            model = monaco.editor.createModel(file.content, file.language);
            fileModels[id] = model;
        }
        editor.setModel(model);
        document.getElementById('fileSelector').value = id;
        document.getElementById('filename').value = file.name;
    }

    document.getElementById('fileSelector').addEventListener('change', (e) => switchFile(e.target.value));

    document.getElementById('addFileBtn').addEventListener('click', () => {
        const name = prompt("Enter file name (e.g. script.js, main.py):");
        if(name) {
            const id = 'file_' + Date.now();
            projectFiles[id] = { name: name, content: '', language: getLanguage(name) };
            updateFileSelector();
            switchFile(id);
        }
    });

    document.getElementById('deleteFileBtn').addEventListener('click', () => {
        if(Object.keys(projectFiles).length <= 1) return showNotif("Cannot delete last file", "error");
        delete projectFiles[currentFileId];
        delete fileModels[currentFileId]; 
        const nextId = Object.keys(projectFiles)[0];
        updateFileSelector();
        switchFile(nextId);
    });

    function getLanguage(filename) {
        if (filename.endsWith('.js')) return 'javascript';
        if (filename.endsWith('.css')) return 'css';
        if (filename.endsWith('.json')) return 'json';
        if (filename.endsWith('.py')) return 'python';
        return 'html';
    }

    // AUTH
    document.getElementById('signInBtn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
        if (error) showNotif(error.message, 'error');
        else document.getElementById('loginModal').classList.add('hidden');
    });

    document.getElementById('useInviteBtn').addEventListener('click', async () => {
        const code = document.getElementById('inviteCode').value;
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPassword').value;
        if (code !== 'FLASH-2026-WELCOME') return showNotif("Invalid Invite Code", "error");
        const { error } = await supabaseClient.auth.signUp({ email, password: pass });
        if (error) showNotif(error.message, 'error');
        else {
            showNotif("Account Created!", 'success');
            document.getElementById('loginModal').classList.add('hidden');
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => supabaseClient.auth.signOut());

    // SAVE
    document.getElementById('saveBtn').addEventListener('click', async () => {
        projectFiles[currentFileId].content = editor.getValue();
        projectFiles[currentFileId].name = document.getElementById('filename').value;
        projectFiles[currentFileId].language = getLanguage(projectFiles[currentFileId].name);
        updateFileSelector();

        const payload = {
            id: currentProjectId || (currentUser ? undefined : 'temp_' + Date.now()),
            name: projectFiles['main']?.name || 'Untitled',
            code: JSON.stringify({ files: projectFiles }),
            updated_at: new Date().toISOString()
        };

        if (currentUser) {
            payload.user_id = currentUser.id;
            const { data, error } = await supabaseClient.from('projects').upsert(payload).select();
            if (error) showNotif(error.message, 'error');
            else {
                currentProjectId = data[0].id;
                showNotif('Saved to Cloud', 'success');
                refreshDashboard();
            }
        } else {
            const projects = JSON.parse(localStorage.getItem('flashcode_projects') || '{}');
            projects[payload.id] = payload;
            localStorage.setItem('flashcode_projects', JSON.stringify(projects));
            currentProjectId = payload.id;
            showNotif('Saved to Browser', 'success');
            refreshDashboard();
        }
    });

    // RUN & PYTHON SUPPORT
    document.getElementById('runBtn').addEventListener('click', () => {
        document.getElementById('consoleOutput').innerHTML = '';
        
        const currentFile = projectFiles[currentFileId];
        if (currentFile) currentFile.content = editor.getValue();

        // SMART RUN LOGIC:
        // 1. If looking at a Python file, run it.
        if (currentFile.name.endsWith('.py')) {
            runPython(currentFile.content);
            return;
        }

        // 2. Otherwise, assume Web Project. Find HTML.
        let htmlContent = '';
        let cssContent = '';
        let jsContent = '';

        Object.values(projectFiles).forEach(f => {
            if(f.name.endsWith('.html')) htmlContent += f.content;
            else if(f.name.endsWith('.css')) cssContent += f.content;
            else if(f.name.endsWith('.js')) jsContent += f.content;
        });

        // Auto-wrap JS if no HTML
        if(!htmlContent && jsContent) {
            htmlContent = `<html><body><h2>Running JS...</h2><p>Check console for output.</p></body></html>`;
        } else if (!htmlContent) {
             htmlContent = '<html><body><h1>No HTML File Found</h1><p>Create an .html file to run web project, or a .py file to run Python.</p></body></html>';
        }

        const consoleScript = `
            <script>
                const _log = (type, args) => {
                    window.parent.postMessage({ type: 'console', method: type, args: Array.from(args).map(String) }, '*');
                };
                console.log = (...args) => _log('log', args);
                console.error = (...args) => _log('error', args);
                console.warn = (...args) => _log('warn', args);
                console.info = (...args) => _log('info', args);
                window.onerror = (msg, url, line) => _log('error', [msg + ' (Line ' + line + ')']);
            <\/script>
        `;

        const finalCode = `
            <!DOCTYPE html>
            <html>
                <head>
                    <style>${cssContent}</style>
                    ${consoleScript}
                </head>
                <body>
                    ${htmlContent}
                    <script>${jsContent}<\/script>
                </body>
            </html>
        `;

        const blob = new Blob([finalCode], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        document.getElementById('previewFrame').src = url;
        document.querySelector('[data-tab="preview"]').click();
    });

    function runPython(code) {
        showNotif("Loading Python Runtime...", "info");
        document.querySelector('[data-tab="console"]').click();
        
        const pyodideHtml = `
            <!DOCTYPE html>
            <html>
            <head>
                <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"><\/script>
                <script>
                    async function main() {
                        try {
                            const _log = (msg) => window.parent.postMessage({ type: 'console', method: 'log', args: [msg] }, '*');
                            const _err = (msg) => window.parent.postMessage({ type: 'console', method: 'error', args: [msg] }, '*');
                            _log("Initializing Pyodide...");
                            const pyodide = await loadPyodide();
                            _log("Python Ready. Running...");
                            pyodide.setStdout({ batched: (s) => _log(s) });
                            pyodide.setStderr({ batched: (s) => _err(s) });
                            await pyodide.runPythonAsync(\`${code.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`);
                            _log("Execution finished.");
                        } catch(err) {
                            window.parent.postMessage({ type: 'console', method: 'error', args: [err.toString()] }, '*');
                        }
                    }
                    main();
                <\/script>
            </head>
            <body></body>
            </html>
        `;
        
        const blob = new Blob([pyodideHtml], { type: 'text/html' });
        document.getElementById('previewFrame').src = URL.createObjectURL(blob);
    }

    window.addEventListener('message', (e) => {
        if (e.data.type === 'console') {
            const out = document.getElementById('consoleOutput');
            const line = document.createElement('div');
            line.className = `console-msg console-${e.data.method}`;
            line.textContent = `> ${e.data.args.join(' ')}`;
            out.appendChild(line);
            out.scrollTop = out.scrollHeight;
        }
    });

    // AI FEATURES
    let aiConfig = { provider: 'openrouter_free', key: '' };
    
    function loadSettings() {
        const stored = localStorage.getItem('flashcode_ai_config');
        if(stored) aiConfig = JSON.parse(stored);
        document.getElementById('aiProvider').value = aiConfig.provider;
        document.getElementById('apiKey').value = aiConfig.key;
        toggleKeyField();
    }

    function toggleKeyField() {
        const p = document.getElementById('aiProvider').value;
        const noKeyNeeded = ['openrouter_free', 'wiki'].includes(p);
        document.getElementById('apiKeyField').classList.toggle('hidden', noKeyNeeded);
    }

    document.getElementById('aiProvider').addEventListener('change', toggleKeyField);
    
    document.getElementById('settingsBtn').addEventListener('click', () => document.getElementById('settingsModal').classList.remove('hidden'));
    document.getElementById('closeSettingsBtn').addEventListener('click', () => document.getElementById('settingsModal').classList.add('hidden'));
    
    document.getElementById('saveSettingsBtn').addEventListener('click', () => {
        aiConfig = {
            provider: document.getElementById('aiProvider').value,
            key: document.getElementById('apiKey').value
        };
        localStorage.setItem('flashcode_ai_config', JSON.stringify(aiConfig));
        document.getElementById('settingsModal').classList.add('hidden');
        showNotif("Settings Saved", "success");
    });

    document.querySelector('[data-view="vibe"]').addEventListener('click', () => document.getElementById('vibeOverlay').classList.remove('hidden'));
    document.getElementById('closeVibeBtn').addEventListener('click', () => document.getElementById('vibeOverlay').classList.add('hidden'));

    document.getElementById('generateVibeBtn').addEventListener('click', async () => {
        if(aiConfig.provider === 'wiki') return showNotif("Wiki Mode cannot write code.", "error");
        
        const prompt = document.getElementById('vibePrompt').value;
        const btn = document.getElementById('generateVibeBtn');
        btn.innerHTML = 'Generating...';
        
        try {
            const code = await callAI("Generate full HTML/JS code for: " + prompt, [], 'generation');
            if(projectFiles[currentFileId]) projectFiles[currentFileId].content = code;
            editor.setValue(code);
            document.getElementById('vibeOverlay').classList.add('hidden');
            showNotif("Code Generated!", "success");
        } catch(e) {
            showNotif("AI Error: " + e.message, "error");
        } finally {
            btn.innerHTML = '<i data-lucide="wand-2" class="w-5 h-5"></i> Generate Magic';
            lucide.createIcons();
        }
    });

    document.getElementById('sendChatBtn').addEventListener('click', async () => {
        const inp = document.getElementById('chatInput');
        const msg = inp.value;
        if(!msg) return;
        
        addChatMsg('user', msg);
        chatHistory.push({ role: 'user', content: msg });
        inp.value = '';
        
        try {
            const res = await callAI(msg, chatHistory, 'chat');
            addChatMsg('ai', res);
            chatHistory.push({ role: 'assistant', content: res });
        } catch(e) {
            addChatMsg('ai', "Error: " + e.message);
        }
    });

    function addChatMsg(role, text) {
        const div = document.createElement('div');
        div.className = role === 'user' ? 'text-right' : 'text-left';
        
        let content = text;
        
        // Simple Markdown Code Block Formatting
        if (role === 'ai' || role === 'assistant') {
            // Replace ```lang ... ``` with styled boxes
            content = content.replace(/```(\w*)([\s\S]*?)```/g, (match, lang, code) => {
                return `
                    <div class="chat-content text-left">
                        <span class="code-header">${lang || 'CODE'}</span>
                        <pre><code>${code.trim().replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>
                    </div>
                `;
            });
            
            // Basic Bold/Italic formatting
            content = content.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            content = content.replace(/\*(.*?)\*/g, '<i>$1</i>');
        }

        div.innerHTML = `
            <div class="inline-block max-w-[90%] px-4 py-3 rounded-lg ${role === 'user' ? 'bg-blue-600' : 'bg-gray-700'} text-sm leading-relaxed shadow-sm">
                ${content}
            </div>
        `;
        document.getElementById('chatMessages').appendChild(div);
        document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
    }

    async function callAI(prompt, history, mode = 'chat') {
        
        // --- PREPARE CONTEXT (Attached to prompt or system message) ---
        let context = "";
        if (editor) {
            const currentCode = editor.getValue();
            const currentFileName = projectFiles[currentFileId].name;
            if (currentCode.trim().length > 0) {
                // Truncate overly large files to save tokens
                const truncatedCode = currentCode.length > 5000 ? currentCode.substring(0, 5000) + "\n...[truncated]" : currentCode;
                context = `\n\n[CONTEXT: User is currently editing file '${currentFileName}'. Code content:]\n\`\`\`\n${truncatedCode}\n\`\`\`\n`;
            }
        }

        const fullSystemPrompt = SYSTEM_PROMPT + context;

        // --- OPENROUTER (FREE MODE) ---
        if(aiConfig.provider === 'openrouter_free') {
            const key = OPENROUTER_API_KEY;
            
            if(!key) return "Please paste your OpenRouter API Key into the 'const OPENROUTER_API_KEY' variable at the start of the script.";

            // For Chat, we inject context into the latest message logic or system prompt
            let messages = [];
            if (mode === 'chat') {
                messages = [{ role: 'system', content: fullSystemPrompt }, ...history];
            } else {
                messages = [{ role: 'system', content: fullSystemPrompt }, { role: 'user', content: prompt }];
            }

            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${key}`,
                    "Content-Type": "application/json",
                    "HTTP-Referer": window.location.href,
                    "X-Title": "FlashCode IDE"
                },
                body: JSON.stringify({
                    "model": "arcee-ai/trinity-large-preview:free",
                    "messages": messages
                })
            });
            
            if(!res.ok) {
                const err = await res.json();
                throw new Error(err.error?.message || "OpenRouter Error");
            }
            
            const data = await res.json();
            let txt = data.choices[0].message.content;
            
            // Only strip code for 'generation' mode (Vibe), NOT chat
            if(mode === 'generation' && txt.includes('```')) {
                // Split by ``` and take the second part (index 1)
                let parts = txt.split('```');
                if (parts.length >= 2) {
                    txt = parts[1];
                    // Remove language identifier if present (e.g., "python\n")
                    txt = txt.replace(/^[a-z]+\n/, '');
                }
            }
            return txt;
        }

        // --- LOCAL WIKI ---
        if(aiConfig.provider === 'wiki') {
            const searchRes = await fetch(`https://en.wikipedia.org/w/api.php?origin=*&action=opensearch&search=${encodeURIComponent(prompt)}&limit=1&format=json`);
            const searchData = await searchRes.json();
            if (searchData[1].length === 0) return "I couldn't find that in my Local Knowledge Base. Try connecting a real AI key in Settings!";
            const title = searchData[1][0];
            const url = searchData[3][0];
            const summaryRes = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
            const summaryData = await summaryRes.json();
            return `<b>${title}</b><br/><br/>${summaryData.extract}<br/><br/><a href="${url}" target="_blank" class="text-blue-400 underline">Read more on Wikipedia</a>`;
        }
        
        if(!aiConfig.key) throw new Error("Missing API Key");

        if(aiConfig.provider === 'gemini') {
            const contents = history.length > 0 ? history.map(m => ({
                role: m.role === 'user' ? 'user' : 'model',
                parts: [{ text: m.content }]
            })) : [{ role: 'user', parts: [{ text: prompt }] }];

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${aiConfig.key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    systemInstruction: { parts: [{ text: fullSystemPrompt }] },
                    contents: contents, 
                    tools: [{ google_search: {} }] 
                })
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error.message);
            let txt = data.candidates[0].content.parts[0].text;
            
            if(mode === 'generation' && txt.includes('```')) {
                // Split by ``` and take the second part (index 1)
                let parts = txt.split('```');
                if (parts.length >= 2) {
                    txt = parts[1];
                    // Remove language identifier if present (e.g., "python\n")
                    txt = txt.replace(/^[a-z]+\n/, '');
                }
            }
            return txt;
        }

        let url = 'https://api.openai.com/v1/chat/completions';
        let model = 'gpt-4';
        let headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${aiConfig.key}` };
        
        let messages = [];
        if (mode === 'chat') {
            messages = [{ role: 'system', content: fullSystemPrompt }, ...history];
        } else {
            messages = [{ role: 'system', content: fullSystemPrompt }, { role: 'user', content: prompt }];
        }
        
        let body = { messages: messages };

        if(aiConfig.provider === 'anthropic') {
            url = 'https://api.anthropic.com/v1/messages';
            headers = { 'Content-Type': 'application/json', 'x-api-key': aiConfig.key, 'anthropic-version': '2023-06-01' };
            // Anthropic handles system prompt separately
            body = { 
                model: "claude-3-opus-20240229", 
                max_tokens: 1024, 
                system: fullSystemPrompt,
                messages: history.length > 0 ? history : [{ role: "user", content: prompt }] 
            };
        } else {
            body.model = model;
        }

        const res = await fetch(url, { method: 'POST', headers, body: JSON.stringify(body) });
        const data = await res.json();
        if(data.error) throw new Error(data.error.message);
        
        let txt = aiConfig.provider === 'anthropic' ? data.content[0].text : data.choices[0].message.content;
        
        if(mode === 'generation' && txt.includes('```')) {
            // Split by ``` and take the second part (index 1)
            let parts = txt.split('```');
            if (parts.length >= 2) {
                txt = parts[1];
                // Remove language identifier if present (e.g., "python\n")
                txt = txt.replace(/^[a-z]+\n/, '');
            }
        }
        return txt;
    }

    // TABS & RESIZER
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active', 'text-blue-400'));
            btn.classList.add('tab-active', 'text-blue-400');
            ['preview', 'console', 'chat'].forEach(t => document.getElementById(t + 'Tab').classList.add('hidden'));
            document.getElementById(btn.dataset.tab + 'Tab').classList.remove('hidden');
        });
    });

    document.querySelectorAll('.activity-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const view = btn.dataset.view;
            if(view === 'vibe') return;
            document.getElementById('dashboardView').classList.add('hidden');
            document.getElementById('editorView').classList.add('hidden');
            document.getElementById(view + 'View').classList.remove('hidden');
            document.querySelectorAll('.activity-btn').forEach(b => b.classList.remove('bg-gray-700', 'text-blue-400'));
            btn.classList.add('bg-gray-700', 'text-blue-400');
            if (view === 'dashboard') refreshDashboard();
        });
    });

    document.getElementById('newProjectBtn').addEventListener('click', () => {
        currentProjectId = null;
        fileModels = {};
        projectFiles = { 'main': { name: 'index.html', content: '<h1>New Project</h1>', language: 'html' } };
        updateFileSelector();
        switchFile('main');
        document.querySelector('[data-view="editor"]').click();
    });

    function refreshDashboard() {
        const grid = document.getElementById('projectsGrid');
        grid.innerHTML = '';
        let projects = [];
        if (currentUser) {
            supabaseClient.from('projects').select('*').order('updated_at', { ascending: false }).then(({data}) => renderCards(data || []));
        } else {
            const local = JSON.parse(localStorage.getItem('flashcode_projects') || '{}');
            renderCards(Object.values(local).sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at)));
        }
    }

    function renderCards(list) {
        const grid = document.getElementById('projectsGrid');
        grid.innerHTML = list.length ? '' : '<p class="text-gray-500 col-span-3 text-center py-10">No projects yet.</p>';
        list.forEach(p => {
            const card = document.createElement('div');
            card.className = 'project-card bg-gray-800 rounded-lg p-6 cursor-pointer relative group';
            const title = document.createElement('h3'); title.className = 'font-bold text-lg mb-1'; title.textContent = p.name;
            const date = document.createElement('p'); date.className = 'text-xs text-gray-500'; date.textContent = new Date(p.updated_at).toLocaleDateString();
            const delBtn = document.createElement('button');
            delBtn.className = 'absolute top-4 right-4 text-gray-500 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-2 hover:bg-gray-700 rounded-full';
            delBtn.innerHTML = '<i data-lucide="trash-2" class="w-4 h-4"></i>';
            delBtn.onclick = (e) => { e.stopPropagation(); deleteProject(p.id); };
            card.appendChild(title); card.appendChild(date); card.appendChild(delBtn);
            card.onclick = () => {
                currentProjectId = p.id;
                projectFiles = typeof p.code === 'string' ? JSON.parse(p.code).files : p.files;
                fileModels = {};
                updateFileSelector();
                switchFile(Object.keys(projectFiles)[0]);
                document.querySelector('[data-view="editor"]').click();
            };
            grid.appendChild(card);
        });
        lucide.createIcons();
    }

    async function deleteProject(id) {
        if(!confirm("Delete this project?")) return;
        if(currentUser) {
             const { error } = await supabaseClient.from('projects').delete().eq('id', id);
             if(!error) showNotif("Project Deleted", "success");
        } else {
            const local = JSON.parse(localStorage.getItem('flashcode_projects') || '{}');
            delete local[id];
            localStorage.setItem('flashcode_projects', JSON.stringify(local));
            showNotif("Project Deleted", "success");
        }
        refreshDashboard();
    }

    function initResizer() {
        const resizer = document.getElementById('resizer');
        const rightPanel = document.getElementById('rightPanel');
        let isResizing = false;
        let startX, startWidth;
        resizer.addEventListener('mousedown', (e) => { isResizing = true; startX = e.clientX; startWidth = rightPanel.offsetWidth; resizer.classList.add('active'); document.body.style.cursor = 'col-resize'; document.getElementById('previewFrame').style.pointerEvents = 'none'; });
        document.addEventListener('mousemove', (e) => { if (!isResizing) return; const width = startWidth - (e.clientX - startX); if(width > 200 && width < window.innerWidth - 200) rightPanel.style.width = width + 'px'; });
        document.addEventListener('mouseup', () => { isResizing = false; resizer.classList.remove('active'); document.body.style.cursor = 'default'; document.getElementById('previewFrame').style.pointerEvents = 'auto'; });
    }

    document.getElementById('toInviteBtn').onclick = () => { document.getElementById('loginView').classList.add('hidden'); document.getElementById('inviteView').classList.remove('hidden'); };
    document.getElementById('backToLoginBtn').onclick = () => { document.getElementById('loginView').classList.remove('hidden'); document.getElementById('inviteView').classList.add('hidden'); };
    document.getElementById('closeLoginBtn').onclick = () => document.getElementById('loginModal').classList.add('hidden');
    document.getElementById('loginBtn').onclick = () => document.getElementById('loginModal').classList.remove('hidden');

    window.onload = initApp;
  </script>
