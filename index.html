<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashCode - AI-Native Web IDE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; overflow: hidden; }
    .resizer {
      width: 4px;
      cursor: col-resize;
      background: #374151;
      transition: background 0.2s;
    }
    .resizer:hover { background: #60a5fa; }
    .resizer.active { background: #3b82f6; }
    textarea { font-family: 'Courier New', monospace; }
    .vibe-overlay {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.95) 0%, rgba(59, 130, 246, 0.95) 100%);
      backdrop-filter: blur(10px);
    }
    .neon-border {
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.5), 0 0 40px rgba(59, 130, 246, 0.3);
      border: 2px solid #8b5cf6;
    }
    .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
    .console-log { color: #10b981; font-family: monospace; font-size: 13px; }
    .console-error { color: #ef4444; font-family: monospace; font-size: 13px; }
    .project-card {
      transition: all 0.3s;
      border: 1px solid #374151;
    }
    .project-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      border-color: #60a5fa;
    }
  </style>
</head>
<body class="bg-gray-900 text-white">
  
  <!-- Main App Container -->
  <div id="app" class="h-screen flex flex-col">
    
    <!-- Top Bar -->
    <div class="bg-gray-800 border-b border-gray-700 px-4 py-2 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <i data-lucide="zap" class="w-6 h-6 text-purple-500"></i>
        <span class="font-bold text-xl">FlashCode</span>
      </div>
      <div id="authButtons" class="flex items-center gap-2">
        <button id="settingsBtn" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded flex items-center gap-2">
          <i data-lucide="settings" class="w-4 h-4"></i>
          Settings
        </button>
        <button id="loginBtn" class="px-4 py-1 bg-blue-600 hover:bg-blue-700 rounded">Login</button>
        <div id="userInfo" class="hidden flex items-center gap-2">
          <span id="userEmail" class="text-sm text-gray-300"></span>
          <button id="logoutBtn" class="px-3 py-1 bg-red-600 hover:bg-red-700 rounded text-sm">Logout</button>
        </div>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="flex-1 flex overflow-hidden">
      
      <!-- Activity Bar (Left) -->
      <div class="w-16 bg-gray-800 border-r border-gray-700 flex flex-col items-center py-4 gap-4">
        <button class="activity-btn w-12 h-12 flex items-center justify-center rounded hover:bg-gray-700 transition" data-view="dashboard" title="Dashboard">
          <i data-lucide="grid-3x3" class="w-6 h-6"></i>
        </button>
        <button class="activity-btn w-12 h-12 flex items-center justify-center rounded bg-gray-700" data-view="editor" title="Editor">
          <i data-lucide="code" class="w-6 h-6"></i>
        </button>
        <button class="activity-btn w-12 h-12 flex items-center justify-center rounded hover:bg-gray-700 transition" data-view="vibe" title="Vibe Mode">
          <i data-lucide="sparkles" class="w-6 h-6 text-purple-400"></i>
        </button>
      </div>

      <!-- Dashboard View -->
      <div id="dashboardView" class="flex-1 p-8 overflow-auto hidden">
        <div class="max-w-7xl mx-auto">
          <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-bold">My Projects</h1>
            <button id="newProjectBtn" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded flex items-center gap-2">
              <i data-lucide="plus" class="w-5 h-5"></i>
              New Project
            </button>
          </div>
          <div id="projectsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Projects will be loaded here -->
          </div>
        </div>
      </div>

      <!-- Editor View -->
      <div id="editorView" class="flex-1 flex">
        
        <!-- Code Editor (Center) -->
        <div class="flex-1 flex flex-col bg-gray-900">
          <div class="bg-gray-800 border-b border-gray-700 px-4 py-2 flex items-center gap-4">
            <div class="flex items-center gap-2">
              <select id="fileSelector" class="bg-gray-700 px-3 py-1 rounded text-sm outline-none focus:ring-2 focus:ring-blue-500">
                <option value="main">main file</option>
              </select>
              <button id="addFileBtn" class="px-2 py-1 bg-gray-700 hover:bg-gray-600 rounded text-sm" title="Add file">
                <i data-lucide="file-plus" class="w-4 h-4"></i>
              </button>
              <button id="deleteFileBtn" class="px-2 py-1 bg-gray-700 hover:bg-gray-600 rounded text-sm" title="Delete file">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>
            </div>
            <input 
              id="filename" 
              type="text" 
              value="index.html" 
              class="bg-gray-700 px-3 py-1 rounded text-sm outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="filename.ext"
            />
            <select id="languageSelector" class="bg-gray-700 px-3 py-1 rounded text-sm outline-none focus:ring-2 focus:ring-blue-500">
              <option value="html">HTML</option>
              <option value="css">CSS</option>
              <option value="javascript">JavaScript</option>
              <option value="typescript">TypeScript</option>
              <option value="python">Python</option>
              <option value="java">Java</option>
              <option value="cpp">C++</option>
              <option value="json">JSON</option>
              <option value="markdown">Markdown</option>
              <option value="plaintext">Plain Text</option>
            </select>
            <div class="flex-1"></div>
            <button id="exportBtn" class="px-3 py-1 bg-purple-600 hover:bg-purple-700 rounded flex items-center gap-2 text-sm">
              <i data-lucide="download" class="w-4 h-4"></i>
              Export
            </button>
            <button id="saveBtn" class="px-3 py-1 bg-green-600 hover:bg-green-700 rounded flex items-center gap-2 text-sm">
              <i data-lucide="save" class="w-4 h-4"></i>
              Save
            </button>
            <button id="runBtn" class="px-4 py-1 bg-blue-600 hover:bg-blue-700 rounded flex items-center gap-2">
              <i data-lucide="play" class="w-4 h-4"></i>
              Run
            </button>
          </div>
          <div id="monacoEditor" class="flex-1"></div>
        </div>

        <!-- Resizer -->
        <div id="resizer" class="resizer"></div>

        <!-- Right Panel (Tools) -->
        <div id="rightPanel" class="w-96 flex flex-col bg-gray-800" style="min-width: 200px; max-width: 800px;">
          
          <!-- Tabs -->
          <div class="flex border-b border-gray-700">
            <button class="tab-btn flex-1 px-4 py-2 text-sm hover:bg-gray-700 tab-active" data-tab="preview">
              PREVIEW
            </button>
            <button class="tab-btn flex-1 px-4 py-2 text-sm hover:bg-gray-700" data-tab="console">
              CONSOLE
            </button>
            <button class="tab-btn flex-1 px-4 py-2 text-sm hover:bg-gray-700" data-tab="assistant">
              AI ASSISTANT
            </button>
          </div>

          <!-- Tab Content -->
          <div class="flex-1 overflow-hidden">
            
            <!-- Preview Tab -->
            <div id="previewTab" class="h-full bg-white">
              <iframe id="previewFrame" class="w-full h-full border-0"></iframe>
            </div>

            <!-- Console Tab -->
            <div id="consoleTab" class="h-full bg-gray-900 p-4 overflow-auto hidden">
              <div id="consoleOutput" class="space-y-1"></div>
            </div>

            <!-- AI Assistant Tab -->
            <div id="assistantTab" class="h-full flex flex-col hidden">
              <div id="chatMessages" class="flex-1 overflow-auto p-4 space-y-3"></div>
              <div class="border-t border-gray-700 p-4">
                <div class="flex gap-2">
                  <input 
                    id="chatInput" 
                    type="text" 
                    placeholder="Ask AI for help with your code..."
                    class="flex-1 bg-gray-700 px-3 py-2 rounded outline-none focus:ring-2 focus:ring-blue-500"
                  />
                  <button id="sendChatBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded">
                    <i data-lucide="send" class="w-4 h-4"></i>
                  </button>
                </div>
              </div>
            </div>

          </div>
        </div>

      </div>

    </div>

  </div>

  <!-- Vibe Mode Overlay -->
  <div id="vibeOverlay" class="hidden fixed inset-0 vibe-overlay flex items-center justify-center z-50">
    <div class="bg-gray-900 rounded-lg p-8 max-w-2xl w-full mx-4 neon-border">
      <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-3">
          <i data-lucide="sparkles" class="w-8 h-8 text-purple-400"></i>
          <h2 class="text-2xl font-bold">Vibe Coding</h2>
        </div>
        <button id="closeVibeBtn" class="text-gray-400 hover:text-white">
          <i data-lucide="x" class="w-6 h-6"></i>
        </button>
      </div>
      <p class="text-gray-300 mb-6">Describe what you want to build, and AI will generate the code.</p>
      <textarea 
        id="vibePrompt" 
        class="w-full h-32 bg-gray-800 text-white p-4 rounded outline-none focus:ring-2 focus:ring-purple-500 mb-4"
        placeholder="Example: Create a colorful particle system with mouse interaction"
      ></textarea>
      <button id="generateVibeBtn" class="w-full py-3 bg-purple-600 hover:bg-purple-700 rounded font-semibold flex items-center justify-center gap-2">
        <i data-lucide="wand-2" class="w-5 h-5"></i>
        Generate Code
      </button>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-gray-800 rounded-lg p-8 max-w-lg w-full mx-4">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold">Settings</h2>
        <button id="closeSettingsBtn" class="text-gray-400 hover:text-white">
          <i data-lucide="x" class="w-6 h-6"></i>
        </button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-2">AI Provider</label>
          <select id="aiProvider" class="w-full bg-gray-700 px-3 py-2 rounded outline-none focus:ring-2 focus:ring-blue-500">
            <option value="anthropic">Anthropic (Claude)</option>
            <option value="openai">OpenAI (GPT-4)</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">API Key</label>
          <input 
            id="apiKey" 
            type="password" 
            placeholder="sk-..."
            class="w-full bg-gray-700 px-3 py-2 rounded outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <button id="saveSettingsBtn" class="w-full py-2 bg-blue-600 hover:bg-blue-700 rounded font-semibold">
          Save Settings
        </button>
      </div>
    </div>
  </div>

  <!-- Login Modal -->
  <div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-gray-800 rounded-lg p-8 max-w-md w-full mx-4">
      <h2 class="text-2xl font-bold mb-6">Sign In</h2>
      <div class="space-y-4">
        <button id="githubSignInBtn" class="w-full py-3 bg-gray-900 hover:bg-gray-700 rounded font-semibold flex items-center justify-center gap-2 border border-gray-600">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
          </svg>
          Continue with GitHub
        </button>
        
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-600"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-gray-800 text-gray-400">Or continue with email</span>
          </div>
        </div>
        
        <input 
          id="loginEmail" 
          type="email" 
          placeholder="Email"
          class="w-full bg-gray-700 px-4 py-2 rounded outline-none focus:ring-2 focus:ring-blue-500"
        />
        <input 
          id="loginPassword" 
          type="password" 
          placeholder="Password"
          class="w-full bg-gray-700 px-4 py-2 rounded outline-none focus:ring-2 focus:ring-blue-500"
        />
        <button id="signInBtn" class="w-full py-2 bg-blue-600 hover:bg-blue-700 rounded font-semibold">
          Sign In
        </button>
        <button id="signUpBtn" class="w-full py-2 bg-gray-700 hover:bg-gray-600 rounded font-semibold">
          Sign Up
        </button>
        <button id="closeLoginBtn" class="w-full py-2 bg-gray-600 hover:bg-gray-500 rounded">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <script>
    // Suppress harmless ResizeObserver errors from Monaco Editor
    const resizeObserverLoopErrRe = /^[^(ResizeObserver loop limit exceeded)]/;
    window.addEventListener('error', (e) => {
      if (resizeObserverLoopErrRe.test(e.message)) {
        const resizeObserverErr = e.message === 'ResizeObserver loop completed with undelivered notifications.' ||
                                  e.message === 'ResizeObserver loop limit exceeded';
        if (resizeObserverErr) {
          e.stopImmediatePropagation();
          e.preventDefault();
          return false;
        }
      }
    });
    
    // Initialize Lucide icons after library loads
    function initLucide() {
      if (typeof lucide !== 'undefined') {
        lucide.createIcons();
      } else {
        setTimeout(initLucide, 50);
      }
    }
    window.addEventListener('DOMContentLoaded', initLucide);

    // Supabase Configuration
    let supabaseClient;
    
    function initSupabase() {
      const SUPABASE_URL = 'https://cxhhcmupzlskffdeamtm.supabase.co';
      const SUPABASE_KEY = 'sb_publishable_BymRGYxch7g8iJs81NDS5w_TfAQ-Plf';
      
      if (typeof window.supabase !== 'undefined') {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        init();
      } else {
        setTimeout(initSupabase, 50);
      }
    }
    
    // Start initialization when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initSupabase);
    } else {
      initSupabase();
    }

    // Initialize Monaco Editor
    function initMonacoEditor() {
      require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
      
      require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(monacoEditorContainer, {
          value: projectFiles[currentFileId].content,
          language: projectFiles[currentFileId].language,
          theme: 'vs-dark',
          automaticLayout: true,
          fontSize: 14,
          minimap: { enabled: true },
          scrollBeyondLastLine: false,
          wordWrap: 'on',
          tabSize: 2,
          insertSpaces: true,
          formatOnPaste: true,
          formatOnType: true
        });
        
        // Sync language selector
        languageSelector.value = projectFiles[currentFileId].language;
        
        // Language selector change
        languageSelector.addEventListener('change', () => {
          const language = languageSelector.value;
          monaco.editor.setModelLanguage(editor.getModel(), language);
          projectFiles[currentFileId].language = language;
        });
        
        // Auto-detect language from filename
        filename.addEventListener('input', () => {
          projectFiles[currentFileId].name = filename.value;
          const detectedLang = detectLanguageFromFilename(filename.value);
          if (detectedLang) {
            languageSelector.value = detectedLang;
            monaco.editor.setModelLanguage(editor.getModel(), detectedLang);
            projectFiles[currentFileId].language = detectedLang;
          }
        });
      });
    }
    
    function detectLanguageFromFilename(fname) {
      const lower = fname.toLowerCase();
      if (lower.endsWith('.html')) return 'html';
      if (lower.endsWith('.css')) return 'css';
      if (lower.endsWith('.js') || lower.endsWith('.jsx')) return 'javascript';
      if (lower.endsWith('.ts') || lower.endsWith('.tsx')) return 'typescript';
      if (lower.endsWith('.json')) return 'json';
      if (lower.endsWith('.py')) return 'python';
      if (lower.endsWith('.java')) return 'java';
      if (lower.endsWith('.cpp') || lower.endsWith('.c')) return 'cpp';
      if (lower.endsWith('.md')) return 'markdown';
      return null;
    }

    // State Management
    let currentUser = null;
    let currentProject = null;
    let isResizing = false;
    let editor = null; // Monaco Editor instance
    let projectFiles = { // Multi-file support
      'main': { name: 'index.html', content: '<!DOCTYPE html>\n<html>\n<head>\n  <title>New Project</title>\n</head>\n<body>\n  <h1>Hello FlashCode!</h1>\n</body>\n</html>', language: 'html' }
    };
    let currentFileId = 'main';

    // DOM Elements
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userInfo = document.getElementById('userInfo');
    const userEmail = document.getElementById('userEmail');
    const loginModal = document.getElementById('loginModal');
    const closeLoginBtn = document.getElementById('closeLoginBtn');
    const signInBtn = document.getElementById('signInBtn');
    const signUpBtn = document.getElementById('signUpBtn');
    const loginEmailInput = document.getElementById('loginEmail');
    const loginPasswordInput = document.getElementById('loginPassword');
    const githubSignInBtn = document.getElementById('githubSignInBtn');
    
    const dashboardView = document.getElementById('dashboardView');
    const editorView = document.getElementById('editorView');
    const projectsGrid = document.getElementById('projectsGrid');
    const newProjectBtn = document.getElementById('newProjectBtn');
    
    const monacoEditorContainer = document.getElementById('monacoEditor');
    const filename = document.getElementById('filename');
    const languageSelector = document.getElementById('languageSelector');
    const fileSelector = document.getElementById('fileSelector');
    const addFileBtn = document.getElementById('addFileBtn');
    const deleteFileBtn = document.getElementById('deleteFileBtn');
    const exportBtn = document.getElementById('exportBtn');
    const runBtn = document.getElementById('runBtn');
    const saveBtn = document.getElementById('saveBtn');
    
    const resizer = document.getElementById('resizer');
    const rightPanel = document.getElementById('rightPanel');
    
    const previewTab = document.getElementById('previewTab');
    const consoleTab = document.getElementById('consoleTab');
    const assistantTab = document.getElementById('assistantTab');
    const consoleOutput = document.getElementById('consoleOutput');
    const previewFrame = document.getElementById('previewFrame');
    
    const vibeOverlay = document.getElementById('vibeOverlay');
    const closeVibeBtn = document.getElementById('closeVibeBtn');
    const vibePrompt = document.getElementById('vibePrompt');
    const generateVibeBtn = document.getElementById('generateVibeBtn');
    
    const settingsModal = document.getElementById('settingsModal');
    const settingsBtn = document.getElementById('settingsBtn');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const aiProvider = document.getElementById('aiProvider');
    const apiKey = document.getElementById('apiKey');
    const saveSettingsBtn = document.getElementById('saveSettingsBtn');
    
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendChatBtn = document.getElementById('sendChatBtn');

    // Initialize
    async function init() {
      // Check for existing session or OAuth callback
      const { data: { session }, error } = await supabaseClient.auth.getSession();
      
      if (session) {
        currentUser = session.user;
        updateAuthUI();
        // If this is an OAuth callback, load projects
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('code')) {
          loadProjects();
          // Clean up URL
          window.history.replaceState({}, document.title, window.location.pathname);
        }
      }
      
      // Listen for auth state changes (important for OAuth callbacks)
      supabaseClient.auth.onAuthStateChange((event, session) => {
        console.log('Auth event:', event, session);
        if (event === 'SIGNED_IN' && session) {
          currentUser = session.user;
          updateAuthUI();
          loginModal.classList.add('hidden');
          loadProjects();
          switchView('dashboard');
        } else if (event === 'SIGNED_OUT') {
          currentUser = null;
          updateAuthUI();
        }
      });
      
      // Load settings
      const provider = localStorage.getItem('aiProvider') || 'anthropic';
      const key = localStorage.getItem('apiKey') || '';
      aiProvider.value = provider;
      apiKey.value = key;
    }

    // Auth UI Update
    function updateAuthUI() {
      if (currentUser) {
        loginBtn.classList.add('hidden');
        userInfo.classList.remove('hidden');
        userEmail.textContent = currentUser.email;
      } else {
        loginBtn.classList.remove('hidden');
        userInfo.classList.add('hidden');
      }
    }

    // Login/Logout
    loginBtn.addEventListener('click', () => loginModal.classList.remove('hidden'));
    closeLoginBtn.addEventListener('click', () => loginModal.classList.add('hidden'));
    
    githubSignInBtn.addEventListener('click', async () => {
      const { data, error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'github',
        options: {
          redirectTo: window.location.origin + '/flashcode'
        }
      });
      if (error) {
        alert('GitHub sign-in failed: ' + error.message);
      }
      // The OAuth flow will redirect the user to GitHub and back
    });
    
    signInBtn.addEventListener('click', async () => {
      const email = loginEmailInput.value;
      const password = loginPasswordInput.value;
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        alert('Login failed: ' + error.message);
      } else {
        currentUser = data.user;
        updateAuthUI();
        loginModal.classList.add('hidden');
        loadProjects();
      }
    });
    
    signUpBtn.addEventListener('click', async () => {
      const email = loginEmailInput.value;
      const password = loginPasswordInput.value;
      const { data, error } = await supabaseClient.auth.signUp({ 
        email, 
        password,
        options: {
          emailRedirectTo: window.location.origin + '/flashcode'
        }
      });
      if (error) {
        if (error.message.includes('Email not confirmed')) {
          alert('Email verification is enabled. To disable it:\n1. Go to Supabase Dashboard\n2. Authentication > Providers\n3. Email > Confirm email = OFF');
        } else {
          alert('Sign up failed: ' + error.message);
        }
      } else if (data.user && !data.session) {
        alert('Please check your email to verify your account. To disable email verification, go to Supabase Dashboard > Authentication > Providers > Email and turn off "Confirm email".');
      } else {
        // Auto sign-in after signup (no email verification needed if disabled in Supabase)
        alert('Account created! You are now signed in.');
        currentUser = data.user;
        updateAuthUI();
        loginModal.classList.add('hidden');
        loadProjects();
        switchView('dashboard');
      }
    });
    
    logoutBtn.addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      currentUser = null;
      updateAuthUI();
      switchView('editor');
    });

    // Activity Bar Navigation
    document.querySelectorAll('.activity-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const view = btn.dataset.view;
        document.querySelectorAll('.activity-btn').forEach(b => b.classList.remove('bg-gray-700'));
        btn.classList.add('bg-gray-700');
        
        if (view === 'dashboard') {
          if (!currentUser) {
            alert('Please login to view your projects');
            return;
          }
          switchView('dashboard');
          loadProjects();
        } else if (view === 'editor') {
          switchView('editor');
        } else if (view === 'vibe') {
          vibeOverlay.classList.remove('hidden');
        }
      });
    });

    function switchView(view) {
      dashboardView.classList.add('hidden');
      editorView.classList.add('hidden');
      
      if (view === 'dashboard') {
        dashboardView.classList.remove('hidden');
      } else if (view === 'editor') {
        editorView.classList.remove('hidden');
      }
    }

    // Load Projects
    async function loadProjects() {
      if (!currentUser) return;
      
      const { data, error } = await supabase
        .from('projects')
        .select('*')
        .order('updated_at', { ascending: false });
      
      if (error) {
        console.error('Error loading projects:', error);
        return;
      }
      
      projectsGrid.innerHTML = '';
      data.forEach(project => {
        const card = document.createElement('div');
        card.className = 'project-card bg-gray-800 rounded-lg p-6 cursor-pointer';
        card.innerHTML = `
          <div class="flex items-start justify-between mb-3">
            <h3 class="text-lg font-semibold">${project.name}</h3>
            <i data-lucide="file-code" class="w-5 h-5 text-blue-400"></i>
          </div>
          <p class="text-sm text-gray-400 mb-3">${new Date(project.updated_at).toLocaleDateString()}</p>
          <div class="flex gap-2">
            <button class="open-btn flex-1 px-3 py-1 bg-blue-600 hover:bg-blue-700 rounded text-sm">Open</button>
            <button class="delete-btn px-3 py-1 bg-red-600 hover:bg-red-700 rounded text-sm">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>
        `;
        
        card.querySelector('.open-btn').addEventListener('click', () => {
          currentProject = project;
          
          // Load files
          try {
            const filesData = JSON.parse(project.code || '{}');
            if (filesData.files) {
              projectFiles = filesData.files;
              currentFileId = filesData.currentFileId || Object.keys(projectFiles)[0];
            } else {
              // Legacy single file
              projectFiles = {
                'main': { name: project.name, content: project.code || '', language: 'html' }
              };
              currentFileId = 'main';
            }
          } catch (e) {
            // Legacy single file
            projectFiles = {
              'main': { name: project.name, content: project.code || '', language: 'html' }
            };
            currentFileId = 'main';
          }
          
          updateFileSelector();
          
          if (editor) {
            editor.setValue(projectFiles[currentFileId].content);
            monaco.editor.setModelLanguage(editor.getModel(), projectFiles[currentFileId].language);
          }
          
          filename.value = projectFiles[currentFileId].name;
          languageSelector.value = projectFiles[currentFileId].language;
          if (project.vibe_prompt) vibePrompt.value = project.vibe_prompt;
          switchView('editor');
          lucide.createIcons();
        });
        
        card.querySelector('.delete-btn').addEventListener('click', async (e) => {
          e.stopPropagation();
          if (confirm('Delete this project?')) {
            await supabaseClient.from('projects').delete().eq('id', project.id);
            loadProjects();
          }
        });
        
        projectsGrid.appendChild(card);
        lucide.createIcons();
      });
    }

    // New Project
    newProjectBtn.addEventListener('click', () => {
      currentProject = null;
      projectFiles = {
        'main': { 
          name: 'index.html', 
          content: '<!DOCTYPE html>\n<html>\n<head>\n  <title>New Project</title>\n</head>\n<body>\n  <h1>Hello FlashCode!</h1>\n</body>\n</html>', 
          language: 'html' 
        }
      };
      currentFileId = 'main';
      
      updateFileSelector();
      
      if (editor) {
        editor.setValue(projectFiles[currentFileId].content);
        monaco.editor.setModelLanguage(editor.getModel(), projectFiles[currentFileId].language);
      }
      filename.value = 'index.html';
      languageSelector.value = 'html';
      vibePrompt.value = '';
      switchView('editor');
    });

    // Save Project
    saveBtn.addEventListener('click', async () => {
      if (!currentUser) {
        alert('Please login to save projects');
        return;
      }
      
      // Save current file content
      if (editor) {
        projectFiles[currentFileId].content = editor.getValue();
      }
      
      // Get project name from first file or use default
      const projectName = projectFiles[Object.keys(projectFiles)[0]].name.replace(/\.[^/.]+$/, '') || 'Untitled Project';
      
      const projectData = {
        user_id: currentUser.id,
        name: projectName,
        code: JSON.stringify({ files: projectFiles, currentFileId: currentFileId }),
        vibe_prompt: vibePrompt.value || null,
        updated_at: new Date().toISOString()
      };
      
      if (currentProject) {
        const { error } = await supabase
          .from('projects')
          .update(projectData)
          .eq('id', currentProject.id);
        
        if (error) {
          alert('Save failed: ' + error.message);
        } else {
          alert('Project saved!');
        }
      } else {
        const { data, error } = await supabase
          .from('projects')
          .insert([projectData])
          .select();
        
        if (error) {
          alert('Save failed: ' + error.message);
        } else {
          currentProject = data[0];
          alert('Project created!');
        }
      }
    });

    // Run Code
    runBtn.addEventListener('click', () => {
      // Save current file
      if (editor) {
        projectFiles[currentFileId].content = editor.getValue();
      }
      
      // Find HTML file to run
      let htmlContent = '';
      const htmlFile = Object.values(projectFiles).find(f => f.name.endsWith('.html'));
      
      if (htmlFile) {
        htmlContent = htmlFile.content;
      } else {
        // If no HTML file, try to run current file if it's HTML-like
        htmlContent = projectFiles[currentFileId].content;
      }
      
      consoleOutput.innerHTML = '';
      
      // Inject console capture
      const wrappedCode = `
        <script>
          (function() {
            const originalLog = console.log;
            const originalError = console.error;
            
            console.log = function(...args) {
              window.parent.postMessage({ type: 'log', data: args }, '*');
              originalLog.apply(console, args);
            };
            
            console.error = function(...args) {
              window.parent.postMessage({ type: 'error', data: args }, '*');
              originalError.apply(console, args);
            };
            
            window.onerror = function(msg, source, lineno, colno, error) {
              window.parent.postMessage({ 
                type: 'error', 
                data: [msg + ' (Line ' + lineno + ')'] 
              }, '*');
              return false;
            };
          })();
        <\/script>
        ${htmlContent}
      `;
      
      const blob = new Blob([wrappedCode], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      previewFrame.src = url;
    });

    // Console Message Handler
    window.addEventListener('message', (e) => {
      if (e.data.type === 'log') {
        const line = document.createElement('div');
        line.className = 'console-log';
        line.textContent = '> ' + e.data.data.join(' ');
        consoleOutput.appendChild(line);
      } else if (e.data.type === 'error') {
        const line = document.createElement('div');
        line.className = 'console-error';
        line.textContent = '❌ ' + e.data.data.join(' ');
        consoleOutput.appendChild(line);
      }
    });

    // Tab Switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
        btn.classList.add('tab-active');
        
        previewTab.classList.add('hidden');
        consoleTab.classList.add('hidden');
        assistantTab.classList.add('hidden');
        
        const tab = btn.dataset.tab;
        if (tab === 'preview') previewTab.classList.remove('hidden');
        else if (tab === 'console') consoleTab.classList.remove('hidden');
        else if (tab === 'assistant') assistantTab.classList.remove('hidden');
      });
    });

    // Resizer Logic
    resizer.addEventListener('mousedown', (e) => {
      isResizing = true;
      resizer.classList.add('active');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      const editorViewRect = editorView.getBoundingClientRect();
      const newWidth = editorViewRect.right - e.clientX;
      const clampedWidth = Math.max(200, Math.min(800, newWidth));
      rightPanel.style.width = clampedWidth + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (isResizing) {
        isResizing = false;
        resizer.classList.remove('active');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      }
    });

    // Vibe Mode
    closeVibeBtn.addEventListener('click', () => vibeOverlay.classList.add('hidden'));
    
    generateVibeBtn.addEventListener('click', async () => {
      const prompt = vibePrompt.value;
      if (!prompt) {
        alert('Please enter a prompt');
        return;
      }
      
      const provider = localStorage.getItem('aiProvider') || 'anthropic';
      const key = localStorage.getItem('apiKey');
      
      if (!key) {
        alert('Please set your API key in Settings');
        return;
      }
      
      generateVibeBtn.disabled = true;
      generateVibeBtn.innerHTML = '<i data-lucide="loader" class="w-5 h-5 animate-spin"></i> Generating...';
      lucide.createIcons();
      
      try {
        let generatedCode = '';
        
        if (provider === 'anthropic') {
          const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': key,
              'anthropic-version': '2023-06-01'
            },
            body: JSON.stringify({
              model: 'claude-sonnet-4-20250514',
              max_tokens: 4000,
              messages: [{
                role: 'user',
                content: `Generate complete HTML5 code for: ${prompt}. Include all CSS and JavaScript in a single file. Make it visually impressive.`
              }]
            })
          });
          
          const data = await response.json();
          generatedCode = data.content[0].text;
        } else {
          const response = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${key}`
            },
            body: JSON.stringify({
              model: 'gpt-4',
              messages: [{
                role: 'user',
                content: `Generate complete HTML5 code for: ${prompt}. Include all CSS and JavaScript in a single file. Make it visually impressive.`
              }]
            })
          });
          
          const data = await response.json();
          generatedCode = data.choices[0].message.content;
        }
        
        // Extract code from markdown if present
        const codeMatch = generatedCode.match(/```html\n([\s\S]*?)\n```/) || 
                         generatedCode.match(/```([\s\S]*?)```/);
        if (codeMatch) {
          generatedCode = codeMatch[1];
        }
        
        if (editor) {
          editor.setValue(generatedCode);
        }
        updateEditorLanguage();
        vibeOverlay.classList.add('hidden');
        alert('Code generated! Click Run to preview.');
        
      } catch (error) {
        alert('Generation failed: ' + error.message);
      } finally {
        generateVibeBtn.disabled = false;
        generateVibeBtn.innerHTML = '<i data-lucide="wand-2" class="w-5 h-5"></i> Generate Code';
        lucide.createIcons();
      }
    });

    // Settings
    settingsBtn.addEventListener('click', () => settingsModal.classList.remove('hidden'));
    closeSettingsBtn.addEventListener('click', () => settingsModal.classList.add('hidden'));
    
    saveSettingsBtn.addEventListener('click', () => {
      localStorage.setItem('aiProvider', aiProvider.value);
      localStorage.setItem('apiKey', apiKey.value);
      alert('Settings saved!');
      settingsModal.classList.add('hidden');
    });

    // AI Assistant Chat
    sendChatBtn.addEventListener('click', sendChatMessage);
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendChatMessage();
    });

    async function sendChatMessage() {
      const message = chatInput.value.trim();
      if (!message) return;
      
      // Add user message
      addChatMessage(message, 'user');
      chatInput.value = '';
      
      const provider = localStorage.getItem('aiProvider') || 'anthropic';
      const key = localStorage.getItem('apiKey');
      
      if (!key) {
        addChatMessage('Please set your API key in Settings', 'assistant');
        return;
      }
      
      const currentCode = editor ? editor.getValue() : '';
      const systemPrompt = `You are an AI coding assistant. The user is working on this code:\n\n${currentCode}\n\nHelp them with their question.`;
      
      try {
        let responseText = '';
        
        if (provider === 'anthropic') {
          const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': key,
              'anthropic-version': '2023-06-01'
            },
            body: JSON.stringify({
              model: 'claude-sonnet-4-20250514',
              max_tokens: 2000,
              messages: [{
                role: 'user',
                content: systemPrompt + '\n\nUser: ' + message
              }]
            })
          });
          
          if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error?.message || 'API request failed');
          }
          
          const data = await response.json();
          responseText = data.content[0].text;
        } else {
          const response = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${key}`
            },
            body: JSON.stringify({
              model: 'gpt-4',
              messages: [
                { role: 'system', content: systemPrompt },
                { role: 'user', content: message }
              ]
            })
          });
          
          const data = await response.json();
          responseText = data.choices[0].message.content;
        }
        
        addChatMessage(responseText, 'assistant');
        
      } catch (error) {
        addChatMessage('Error: ' + error.message, 'assistant');
      }
    }

    function addChatMessage(text, sender) {
      const msg = document.createElement('div');
      msg.className = sender === 'user' ? 'text-right' : 'text-left';
      msg.innerHTML = `
        <div class="inline-block max-w-[80%] px-4 py-2 rounded-lg ${
          sender === 'user' ? 'bg-blue-600' : 'bg-gray-700'
        }">
          <p class="text-sm whitespace-pre-wrap">${text}</p>
        </div>
      `;
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // ============================================
    // INITIALIZATION - Must be LAST
    // ============================================
    
    // Initialize Monaco when the library is ready
    if (typeof require !== 'undefined') {
      initMonacoEditor();
    } else {
      setTimeout(initMonacoEditor, 100);
    }

    // File Management - Initialize after DOM is ready
    function updateFileSelector() {
      fileSelector.innerHTML = '';
      Object.keys(projectFiles).forEach(fileId => {
        const option = document.createElement('option');
        option.value = fileId;
        option.textContent = projectFiles[fileId].name;
        fileSelector.appendChild(option);
      });
      fileSelector.value = currentFileId;
    }

    // Initialize file selector
    updateFileSelector();

    fileSelector.addEventListener('change', () => {
      // Save current file
      if (editor) {
        projectFiles[currentFileId].content = editor.getValue();
      }
      
      // Switch to new file
      currentFileId = fileSelector.value;
      const file = projectFiles[currentFileId];
      
      if (editor) {
        editor.setValue(file.content);
        monaco.editor.setModelLanguage(editor.getModel(), file.language);
      }
      
      filename.value = file.name;
      languageSelector.value = file.language;
    });

    addFileBtn.addEventListener('click', () => {
      const fileName = prompt('Enter filename (e.g., style.css, script.js):');
      if (!fileName) return;
      
      const fileId = 'file_' + Date.now();
      const detectedLang = detectLanguageFromFilename(fileName) || 'plaintext';
      
      projectFiles[fileId] = {
        name: fileName,
        content: '',
        language: detectedLang
      };
      
      updateFileSelector();
      fileSelector.value = fileId;
      fileSelector.dispatchEvent(new Event('change'));
      lucide.createIcons();
    });

    deleteFileBtn.addEventListener('click', () => {
      if (Object.keys(projectFiles).length === 1) {
        alert('Cannot delete the last file');
        return;
      }
      
      if (!confirm(`Delete ${projectFiles[currentFileId].name}?`)) return;
      
      delete projectFiles[currentFileId];
      currentFileId = Object.keys(projectFiles)[0];
      
      updateFileSelector();
      fileSelector.dispatchEvent(new Event('change'));
    });

    // Export Project
    exportBtn.addEventListener('click', () => {
      // Save current file content
      if (editor) {
        projectFiles[currentFileId].content = editor.getValue();
      }
      
      if (Object.keys(projectFiles).length === 1) {
        // Single file export
        const file = projectFiles[currentFileId];
        const blob = new Blob([file.content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name;
        a.click();
        URL.revokeObjectURL(url);
      } else {
        // Multi-file export as ZIP (using JSZip would require adding library)
        // For now, download each file separately
        Object.values(projectFiles).forEach(file => {
          const blob = new Blob([file.content], { type: 'text/plain' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = file.name;
          a.click();
          URL.revokeObjectURL(url);
        });
        alert('All files downloaded separately');
      }
    });
  </script>

</body>
</html>
